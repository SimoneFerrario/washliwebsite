      journey: "M250,110 C190,170 130,220 140,310 C150,395 320,430 310,520 C300,610 120,640 130,730 C138,815 200,860 240,910",
      stations: [{ x: 250, y: 110 }, { x: 140, y: 310 }, { x: 310, y: 520 }, { x: 130, y: 730 }, { x: 240, y: 910 }],
      sats: [{ x: 380, y: 150, lx: 250, ly: 110 }, { x: 360, y: 470, lx: 310, ly: 520 }, { x: 300, y: 740, lx: 130, ly: 730 }, { x: 70, y: 870, lx: 240, ly: 910 }],
      r: 1.18, lblDy: 80, capDy: 101, lblFs: 22, capFs: 16, satFs: 16,
    };

    const ICONS = [
      html`<g><path d="M-9,1 L0,-9 L9,1" /><path d="M-6,-1 V9 H6 V-1" /><path d="M-2,9 V4 H2 V9" /></g>`,
      html`<g><rect x="-10" y="-5" width="12" height="9" rx="1.5"/><path d="M2,-2 H7 L10,2 V4 H2 Z"/><circle cx="-5" cy="6" r="2.2"/><circle cx="6" cy="6" r="2.2"/></g>`,
      html`<g><rect x="-9" y="-9" width="18" height="18" rx="3"/><circle cx="0" cy="2" r="5.2"/><path d="M-6,-6 h2"/><path d="M3,-6 h3"/></g>`,
      html`<g><rect x="-10" y="-5" width="12" height="9" rx="1.5"/><path d="M2,-2 H7 L10,2 V4 H2 Z"/><circle cx="-5" cy="6" r="2.2"/><circle cx="6" cy="6" r="2.2"/></g>`,
      html`<g><path d="M0,-10 L2.4,-2.4 L10,0 L2.4,2.4 L0,10 L-2.4,2.4 L-10,0 L-2.4,-2.4 Z"/><circle cx="7" cy="-7" r="1.4"/></g>`,
    ];

    function Comet({ path, t, d, r, surge }) {
      const tail = r * 5.5;
      return html`
        <g class=${surge ? "surge" : "flowdot"} style=${{ offsetPath: `path('${path}')`, "--t": t, "--d": d, "--st": t, "--sd": d }}>
          <ellipse cx=${-tail / 2} cy="0" rx=${tail / 2} ry=${r * 0.85} fill="url(#tailGrad)" opacity=${surge ? 0.85 : 0.6} />
          <circle r=${r + 4} fill="url(#dotGlow)" opacity="0.55" />
          <circle r=${r} fill="url(#dotFill)" stroke="oklch(0.62 0.13 258 / 0.5)" stroke-width="0.8" />
          <circle cx=${-r * 0.3} cy=${-r * 0.35} r=${r * 0.32} fill="#fff" opacity="0.9" />
        </g>`;
    }

    function Flow({ L }) {
      const dots = [
        { d: "0s", t: "7.5s", r: 6 }, { d: "-1.5s", t: "7.5s", r: 4 }, { d: "-3s", t: "7.5s", r: 5.5 },
        { d: "-4.4s", t: "7.5s", r: 3.4 }, { d: "-5.8s", t: "7.5s", r: 5 }, { d: "-0.8s", t: "9s", r: 3.6 },
      ];
      return html`<g>
        ${dots.map((p, i) => html`<${Comet} key=${"c" + i} path=${L.journey} t=${p.t} d=${p.d} r=${p.r} />`)}
        <${Comet} path=${L.journey} t="5s" d="0s" r=${9} surge=${true} />
        <${Comet} path=${L.journey} t="5s" d="-2.5s" r=${7} surge=${true} />
      </g>`;
    }

    function Station({ s, i, label, L }) {
      const g = 46 * L.r, mid = 34 * L.r, inner = 26 * L.r, orb = 40 * L.r;
      return html`
        <${motion.g}
          initial=${ini({ opacity: 0, scale: 0.2 })} animate=${{ opacity: 1, scale: 1 }}
          transition=${{ delay: 0.5 + i * 0.14, duration: 0.75, ease: EASE }}
          style=${{ transformBox: "fill-box", transformOrigin: "center" }}>
          <g style=${{ animation: `nodefloat ${5 + i * 0.4}s ease-in-out ${i * 0.5}s infinite` }}>
            <circle cx=${s.x} cy=${s.y} r=${g} class="glow-ring" style=${{ "--gd": `${i * 0.55}s` }} fill="url(#glowGrad)" />
            <g class="breathe" style=${{ "--bp": `${4 + i * 0.5}s`, "--bd": `${i * 0.4}s` }}>
              <circle cx=${s.x} cy=${s.y} r=${orb} class="orbit" style=${{ "--sp": `${8 + i * 1.5}s` }} fill="none" stroke="url(#flowGrad)" stroke-width=${2.4 * L.r} stroke-linecap="round" stroke-dasharray=${`${orb * 0.7} ${orb * 3.6}`} opacity="0.8" />
              <circle cx=${s.x} cy=${s.y} r=${mid} fill="url(#nodeGrad)" />
              <circle cx=${s.x} cy=${s.y} r=${inner} fill="oklch(0.995 0.004 250)" />
              <g transform=${`translate(${s.x},${s.y}) scale(${1.05 * L.r})`} fill="none" stroke="var(--primary)" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">${ICONS[i]}</g>
            </g>
            <text x=${s.x} y=${s.y + L.lblDy} class="node-label" style=${{ fontSize: L.lblFs }}>${label.t}</text>
            <text x=${s.x} y=${s.y + L.capDy} class="node-cap" style=${{ fontSize: L.capFs }}>${label.c}</text>
          </g>
        <//>`;
    }

    function Satellite({ s, i, label, L }) {
      return html`
        <${motion.g} initial=${ini({ opacity: 0 })} animate=${{ opacity: 1 }} transition=${{ delay: 1.1 + i * 0.12, duration: 0.9, ease: EASE }}>
          <path class="sat-link" d=${`M${s.lx},${s.ly} L${s.x},${s.y}`} />
          <g style=${{ animation: `nodefloat ${6 + i}s ease-in-out ${i * 0.7}s infinite` }}>
            <circle cx=${s.x} cy=${s.y} r=${7 * L.r} fill="oklch(0.995 0.004 250)" stroke="var(--secondary)" stroke-width=${2.2 * L.r} />
            <circle cx=${s.x} cy=${s.y} r=${2.6 * L.r} fill="var(--secondary)" />
            <text x=${s.x} y=${s.y < 200 ? s.y - 15 : s.y + 24} class="sat-label" style=${{ fontSize: L.satFs }}>${label}</text>
          </g>
        <//>`;
    }

    function Stage({ t, L }) {
      return html`
        <div class="stage">
          <${motion.svg} viewBox=${L.vb} initial=${ini({ opacity: 0, scale: 0.95 })} animate=${{ opacity: 1, scale: 1 }} transition=${{ duration: 1, ease: EASE }}>
            <defs>
              <linearGradient id="nodeGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="var(--primary)" /><stop offset="1" stop-color="var(--secondary)" /></linearGradient>
              <radialGradient id="glowGrad"><stop offset="0" stop-color="var(--node-glow)" /><stop offset="1" stop-color="transparent" /></radialGradient>
              <linearGradient id="flowGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="var(--primary)" /><stop offset="1" stop-color="var(--secondary)" /></linearGradient>
              <radialGradient id="dotFill"><stop offset="0" stop-color="#ffffff" /><stop offset="1" stop-color="oklch(0.86 0.07 220)" /></radialGradient>
              <radialGradient id="dotGlow"><stop offset="0" stop-color="oklch(0.7 0.14 220 / 0.8)" /><stop offset="1" stop-color="transparent" /></radialGradient>
              <linearGradient id="tailGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="transparent" /><stop offset="1" stop-color="oklch(0.72 0.13 218 / 0.85)" /></linearGradient>
            </defs>
            <${motion.path} d=${L.journey} class="net-base" initial=${ini({ pathLength: 0 })} animate=${{ pathLength: 1 }} transition=${{ duration: 1.4, ease: EASE, delay: 0.2 }} />
            <path d=${L.journey} class="net-flow" />
            ${L.sats.map((s, i) => html`<${Satellite} key=${"s" + i} s=${s} i=${i} label=${t.sats[i]} L=${L} />`)}
            <${Flow} L=${L} />
            ${L.stations.map((s, i) => html`<${Station} key=${"n" + i} s=${s} i=${i} label=${t.nodes[i]} L=${L} />`)}
          <//>
          <${motion.div} class="chip" style=${{ top: "7%", left: "26%" }} initial=${ini({ opacity: 0, y: 10 })} animate=${{ opacity: 1, y: 0 }} transition=${{ delay: 1.5, duration: 0.6, ease: EASE }}><span class="live"></span>${t.chip1}<//>
          <${motion.div} class="chip" style=${{ bottom: "10%", right: "3%" }} initial=${ini({ opacity: 0, y: 10 })} animate=${{ opacity: 1, y: 0 }} transition=${{ delay: 1.75, duration: 0.6, ease: EASE }}><span class="live"></span>${t.chip2}<//>
        </div>`;
    }

    function Words({ text, accent, base }) {
      const out = [];
      text.split(" ").forEach((w, i) => {
        out.push(html`<span class=${"word" + (accent ? " accent" : "")} key=${(accent ? "a" : "b") + i}><span style=${{ "--d": (base + i * 0.07) + "s" }}>${w}</span></span>`);
        out.push(" ");
      });
      return out;
    }

    function useLayout() {
      const get = () => (typeof window !== "undefined" && window.innerWidth <= 860 ? "v" : "h");
      const [m, setM] = React.useState(get);
      React.useEffect(() => {
        const on = () => setM(get());
        window.addEventListener("resize", on);
        return () => window.removeEventListener("resize", on);
      }, []);
      return m;
    }

    function CookieBanner({ t }) {
      const [show, setShow] = React.useState(false);
      React.useEffect(() => {
        let consent = null;
        try { consent = localStorage.getItem("washli-cookie-consent"); } catch (e) {}
        if (consent) return;
        const id = setTimeout(() => setShow(true), 900);
        return () => clearTimeout(id);
      }, []);
      const choose = (v) => { try { localStorage.setItem("washli-cookie-consent", v); } catch (e) {} setShow(false); };
      return html`
        <div class=${"cookie" + (show ? " show" : "")} role="dialog" aria-live="polite" aria-label="Cookie">
          <span class="ck-ic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="9" cy="10" r="1"/><circle cx="14.5" cy="14" r="1"/><circle cx="15" cy="8.5" r="1"/></svg></span>
          <p>${t.ckText}</p>
          <div class="ck-actions">
            <button class="ck-decline" type="button" onClick=${() => choose("declined")}>${t.ckDecline}</button>
            <button class="ck-accept" type="button" onClick=${() => choose("accepted")}>${t.ckAccept}</button>
          </div>
        </div>`;
    }

    function App() {
      const [lang, setLang] = React.useState("it");
      const mode = useLayout();
      const L = mode === "v" ? LAYOUT_V : LAYOUT_H;
      const t = T[lang];
      const langs = ["it", "de", "fr", "en"];
      const wc = words => words.split(" ").length;

      // ---- email capture → Web3Forms ----
      const [email, setEmail] = React.useState("");
      const [status, setStatus] = React.useState("idle"); // idle | sending | done | error
      const [invalid, setInvalid] = React.useState(false);
      const onSubmit = async (e) => {
        e.preventDefault();
        const val = (email || "").trim();
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) { setInvalid(true); return; }
        const formEl = e.currentTarget;
        if (formEl && formEl.botcheck && formEl.botcheck.checked) return; // honeypot
        setStatus("sending");
        try {
          const fd = new FormData();
          fd.append("access_key", WEB3FORMS_KEY);
          fd.set("email", val);
          fd.append("subject", "New washli waitlist signup");
          fd.append("from_name", "washli website");
          fd.append("language", lang);
          const r = await fetch("https://api.web3forms.com/submit", { method: "POST", body: fd });
          const data = await r.json();
          setStatus(data && data.success ? "done" : "error");
        } catch (err) { setStatus("error"); }
      };

      return html`
        <header class="topbar">
          <div class="lockup"><img src="assets/washli_mark.png" alt="washli" width="38" height="38" /><b>washli</b></div>
          <nav class="seg" aria-label="Lingua">${langs.map((l) => html`<button key=${l} aria-pressed=${l === lang} onClick=${() => setLang(l)}>${l.toUpperCase()}</button>`)}</nav>
        </header>
        <main class=${"hero" + (mode === "v" ? " vertical" : "")}>
          <div class="copy">
            <div class="eyebrow rv" style=${{ "--d": "0.05s" }}><span class="dot"></span>${t.eyebrow}</div>
            <h1><${Words} text=${t.h1a} base=${0.15} /><${Words} text=${t.h1b} accent=${true} base=${0.15 + wc(t.h1a) * 0.07} /></h1>
            <p class="sub rv" style=${{ "--d": "0.5s" }}>${t.sub}</p>
            ${status === "done"
              ? html`<${motion.div} class="thanks rv" key="thanks" initial=${ini({ opacity: 0, y: 12, scale: 0.94 })} animate=${{ opacity: 1, y: 0, scale: 1 }} transition=${{ type: "spring", stiffness: 320, damping: 22 }}>
                  <${motion.span} class="pray" animate=${STILL ? {} : { rotate: [0, -16, 13, -7, 0], y: [0, -3, 0] }} transition=${{ duration: 1.15, ease: "easeInOut", delay: 0.12 }}>🙏<//>
                  <span class="tx"><b>${t.thanks}</b><span>${t.thanksSub}</span></span>
                <//>`
              : html`<form class="actions rv" style=${{ "--d": "0.6s" }} onSubmit=${onSubmit} noValidate=${true}>
                  <input type="checkbox" name="botcheck" style=${{ display: "none" }} tabIndex="-1" autoComplete="off" aria-hidden="true" />
                  <label class=${"field" + (invalid ? " invalid" : "")}>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="m4 7 8 6 8-6"/></svg>
                    <input type="email" name="email" required placeholder=${t.ph} aria-label=${t.ph} value=${email} onInput=${(e) => { setEmail(e.target.value); if (invalid) setInvalid(false); }} />
                  </label>
                  <button class="cta" type="submit" disabled=${status === "sending"}>${status === "sending" ? "…" : t.cta}</button>
                <//>`}
            ${status === "error" ? html`<p class="formerr rv">${t.err}</p>` : null}
            <div class="legend rv" style=${{ "--d": "0.7s" }}>
              <span><i style=${{ background: "var(--primary)" }}></i>${t.l1}</span>
              <span><i style=${{ background: "linear-gradient(135deg,var(--primary),var(--secondary))" }}></i>${t.l2}</span>
              <span><i style=${{ background: "var(--secondary)" }}></i>${t.l3}</span>
            </div>
          </div>
          <${Stage} t=${t} L=${L} />
        </main>
        <${CookieBanner} t=${t} />`;
    }

    const style = document.createElement("style");
    style.textContent = "@keyframes nodefloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }";
    document.head.appendChild(style);

    createRoot(document.getElementById("root")).render(html`<${App} />`);

    /* ---- parallax: pointer + device tilt ---- */
    (function () {
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      var root = document.documentElement, raf = 0, tx = 0, ty = 0;
      function set(x, y) { tx = x; ty = y; if (!raf) raf = requestAnimationFrame(apply); }
      function apply() { raf = 0; root.style.setProperty("--px", tx.toFixed(3)); root.style.setProperty("--py", ty.toFixed(3)); }
      window.addEventListener("pointermove", function (e) { set((e.clientX / window.innerWidth) * 2 - 1, (e.clientY / window.innerHeight) * 2 - 1); }, { passive: true });
      window.addEventListener("deviceorientation", function (e) {
        if (e.gamma == null) return;
        set(Math.max(-1, Math.min(1, e.gamma / 28)), Math.max(-1, Math.min(1, ((e.beta || 0) - 45) / 28)));
      }, { passive: true });
    })();

    /* ---- background soap bubbles ---- */
    (function () {
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      var layer = document.getElementById("bubbles");
      function rand(a, b) { return a + Math.random() * (b - a); }
      for (var i = 0; i < 14; i++) {
        var b = document.createElement("span");
        b.className = "sbubble";
        var s = rand(16, 74);
        b.style.width = s + "px"; b.style.height = s + "px"; b.style.left = rand(0, 98) + "vw";
        b.style.setProperty("--dur", rand(18, 30) + "s"); b.style.setProperty("--delay", -rand(0, 24) + "s");
        b.style.setProperty("--wob", rand(-40, 40) + "px"); b.style.setProperty("--maxop", rand(0.35, 0.7).toFixed(2));
        layer.appendChild(b);
      }
    })();
  </script>
</body>
</html>
