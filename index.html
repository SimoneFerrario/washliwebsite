<!DOCTYPE html>
<html lang="it">
<head>

<title>washli — il mondo fresco</title>
<meta name="description" content="washli: fluttua nel mondo fresco del bucato. Un viaggio immersivo in prima persona tra panni puliti, bolle e luce. Trascina per guardarti intorno." />
<meta name="theme-color" content="#1B4DB1" />

<link rel="apple-touch-icon" href="assets/washli_mark.png" />

<style>
  :root {
    --primary: #1B4DB1; --secondary: #24B3A8;
    --text: oklch(0.24 0.04 258); --muted: oklch(0.52 0.035 258);
    --border: oklch(0.9 0.02 252 / 0.7); --card: oklch(0.99 0.004 250 / 0.72);
    --ring: oklch(0.62 0.13 258 / 0.35); color-scheme: light;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { font-family: "Hanken Grotesk", system-ui, sans-serif; color: var(--text); background: #0b2c63; -webkit-font-smoothing: antialiased; overflow: hidden; overscroll-behavior: none; }
  #scene { position: fixed; inset: 0; z-index: 0; display: block; touch-action: none; cursor: grab; }
  #scene:active { cursor: grabbing; }
  #bg { position: fixed; inset: 0; z-index: -1; background: linear-gradient(180deg, #2f7fd6 0%, #0b2c63 100%); }

  #ui { position: fixed; inset: 0; z-index: 4; pointer-events: none; display: flex; flex-direction: column; }
  #ui > * { pointer-events: auto; }
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 18px clamp(16px,4vw,52px); }
  .lockup { display: inline-flex; align-items: center; gap: 11px; }
  .lockup img { width: 36px; height: 36px; filter: drop-shadow(0 8px 20px rgba(0,0,0,0.35)); }
  .lockup b { font-family: "Bricolage Grotesque", sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.03em; color: #fff; }
  .seg { display: inline-flex; gap: 2px; padding: 4px; background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.22); border-radius: 999px; backdrop-filter: blur(10px); }
  .seg button { appearance: none; border: 0; background: transparent; color: rgba(255,255,255,0.7); font: 600 12px/1 "Hanken Grotesk", sans-serif; letter-spacing: 0.04em; padding: 8px 10px; border-radius: 999px; cursor: pointer; transition: color .2s, background-color .2s; }
  .seg button[aria-pressed="true"] { color: var(--primary); background: #fff; }

  .hero { margin-top: auto; padding: clamp(18px,4vw,54px); max-width: 620px; }
  .glass { background: var(--card); border: 1px solid var(--border); border-radius: 22px; padding: clamp(18px,3vw,28px); backdrop-filter: blur(16px) saturate(1.2); box-shadow: 0 30px 70px -36px rgba(5,20,55,0.7); }
  .copy { transition: opacity .25s ease, transform .25s ease; }
  .copy.swap { opacity: 0; transform: translateY(6px); }
  .eyebrow { display: inline-flex; align-items: center; gap: 9px; font-size: 11.5px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--secondary); margin-bottom: 12px; }
  .eyebrow .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--secondary); box-shadow: 0 0 0 0 oklch(0.7 0.12 178 / 0.6); animation: pulse 2.2s ease-out infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 oklch(0.7 0.12 178 / 0.55); } 70% { box-shadow: 0 0 0 11px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }
  h1 { font-family: "Bricolage Grotesque", sans-serif; font-weight: 700; font-size: clamp(30px,6vw,60px); line-height: 1.02; letter-spacing: -0.035em; margin: 0 0 14px; }
  h1 .accent { color: var(--secondary); }
  .sub { font-size: clamp(14px,1.4vw,17px); line-height: 1.6; color: var(--muted); margin: 0 0 20px; max-width: 38em; }
  .actions { display: flex; flex-wrap: wrap; gap: 10px; }
  .field { position: relative; display: flex; align-items: center; flex: 1 1 220px; min-width: 0; border-radius: 13px; background: oklch(1 0 0 / 0.85); border: 1px solid var(--border); }
  .field svg { position: absolute; left: 14px; width: 18px; height: 18px; color: var(--muted); }
  .field input { flex: 1; border: 0; background: transparent; color: var(--text); font: 500 15px/1 "Hanken Grotesk", sans-serif; padding: 15px 14px 15px 42px; outline: none; width: 100%; }
  .field.invalid { box-shadow: 0 0 0 4px oklch(0.62 0.18 18 / 0.3); }
  .cta { position: relative; overflow: hidden; appearance: none; border: 0; cursor: pointer; padding: 14px 20px; border-radius: 12px; color: #fff; font: 700 14.5px/1 "Hanken Grotesk", sans-serif; background: linear-gradient(135deg, var(--primary), var(--secondary)); box-shadow: 0 12px 26px -10px var(--ring); }
  .cta[disabled] { opacity: 0.7; cursor: default; }
  .formerr { color: oklch(0.55 0.18 18); font-size: 13px; margin: 10px 0 0; display: none; }
  .thanks { display: none; align-items: center; gap: 13px; }
  .thanks.show { display: flex; }
  .thanks .pray { font-size: 27px; }
  .thanks b { font-family: "Bricolage Grotesque", sans-serif; font-weight: 700; font-size: 17px; color: var(--text); display: block; }
  .thanks span { font-size: 13.5px; color: var(--muted); }
  .hint { margin: 14px 0 0; font-size: 12px; color: var(--muted); display: inline-flex; align-items: center; gap: 7px; opacity: 0.9; }
  .hint svg { width: 14px; height: 14px; flex: none; }

  .dots { position: fixed; right: clamp(14px,3vw,30px); top: 50%; transform: translateY(-50%); z-index: 5; display: flex; flex-direction: column; gap: 14px; }
  .dots button { appearance: none; border: 0; cursor: pointer; width: 12px; height: 12px; padding: 0; border-radius: 50%; background: rgba(255,255,255,0.35); position: relative; transition: background-color .3s, transform .3s; }
  .dots button[aria-current="true"] { background: #fff; transform: scale(1.3); }
  .dots button::after { content: attr(data-label); position: absolute; right: 22px; top: 50%; transform: translateY(-50%); font: 600 11px/1 "Hanken Grotesk", sans-serif; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(255,255,255,0.85); white-space: nowrap; opacity: 0; transition: opacity .25s; pointer-events: none; }
  .dots button[aria-current="true"]::after, .dots:hover button::after { opacity: 0.95; }

  @media (max-width: 620px) {
    /* slimmer card on phones so the 3D panorama stays mostly visible */
    .hero { max-width: 100%; padding: 0 12px 12px; }
    .glass { padding: 15px 16px; border-radius: 18px; }
    .eyebrow { margin-bottom: 7px; }
    h1 { font-size: clamp(24px,7.5vw,38px); margin-bottom: 8px; }
    .sub { font-size: 13px; line-height: 1.45; margin-bottom: 13px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .actions { flex-direction: column; align-items: stretch; }
    .cta { width: 100%; }
    .hint { display: none; }
    .dots { right: 12px; gap: 12px; }
    .dots button::after { display: none; }
  }

  .cookie { position: fixed; left: 50%; bottom: max(16px, env(safe-area-inset-bottom)); transform: translateX(-50%) translateY(150%); z-index: 6; display: flex; align-items: center; gap: 13px; width: min(640px, calc(100vw - 28px)); padding: 12px 15px; border-radius: 16px; background: oklch(1 0 0 / 0.92); border: 1px solid var(--border); box-shadow: 0 22px 56px -24px rgba(5,20,55,0.6); backdrop-filter: blur(12px); opacity: 0; transition: transform .5s cubic-bezier(.16,1,.3,1), opacity .4s; }
  .cookie.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .cookie p { margin: 0; flex: 1; font-size: 12.5px; line-height: 1.45; color: var(--muted); }
  .cookie .ck { display: flex; gap: 8px; flex: none; }
  .cookie button { appearance: none; cursor: pointer; border: 0; border-radius: 10px; font: 600 12.5px/1 "Hanken Grotesk", sans-serif; padding: 9px 13px; }
  .cookie .ck-no { border: 1px solid var(--border); background: transparent; color: var(--text); }
  .cookie .ck-yes { color: #fff; background: linear-gradient(135deg, var(--primary), var(--secondary)); }
  @media (max-width: 560px) { .cookie { flex-wrap: wrap; } .cookie p { flex-basis: 100%; } .cookie .ck { width: 100%; } .cookie .ck button { flex: 1; } }

  /* ---- loader: a washing machine with a spinning porthole ---- */
  .loader { position: fixed; inset: 0; z-index: 8; display: grid; place-items: center; background: linear-gradient(180deg,#2f7fd6,#0b2c63); transition: opacity .8s ease; }
  .loader.hide { opacity: 0; pointer-events: none; }
  .machine { width: 150px; height: 164px; border-radius: 18px; background: linear-gradient(160deg,#fbfdff,#dde7f2); border: 1px solid #c4d2e3; position: relative; box-shadow: 0 26px 60px -22px rgba(0,0,0,0.5), inset 0 2px 0 rgba(255,255,255,0.8); }
  .machine .panel { position: absolute; top: 12px; left: 12px; right: 12px; height: 22px; border-radius: 9px; background: #eaf1f9; display: flex; align-items: center; gap: 7px; padding: 0 10px; }
  .machine .panel i { width: 7px; height: 7px; border-radius: 50%; background: var(--primary); opacity: 0.85; }
  .machine .panel i:nth-child(3) { margin-left: auto; width: 22px; border-radius: 4px; background: var(--secondary); }
  .machine .door { position: absolute; left: 50%; top: 96px; transform: translate(-50%,-50%); width: 96px; height: 96px; border-radius: 50%; background: #e3ebf4; box-shadow: inset 0 0 0 7px #f3f7fc, inset 0 0 0 9px #b9c8da, 0 6px 14px -6px rgba(0,0,0,0.3); display: grid; place-items: center; }
  .machine .glass { width: 70px; height: 70px; border-radius: 50%; overflow: hidden; position: relative; background: radial-gradient(circle at 38% 32%, #d7ecff 0%, #2f6fd6 70%, #1a4f9e 100%); }
  .machine .drum { position: absolute; inset: 0; animation: spin 1.15s linear infinite; }
  .machine .drum b { position: absolute; border-radius: 4px; opacity: 0.92; }
  .machine .glass::after { content: ""; position: absolute; left: 14%; top: 10%; width: 26%; height: 20%; border-radius: 50%; background: rgba(255,255,255,0.6); filter: blur(2px); } /* glass glint */
  .loadtxt { margin-top: 18px; font: 600 12px/1 "Hanken Grotesk", sans-serif; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.85); }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .machine .drum { animation: none; } }
</style>

<body>
  <div id="bg" aria-hidden="true"></div>
  <canvas id="scene"></canvas>

  <div id="ui">
    <header class="topbar">
      <div class="lockup"><img src="assets/washli_mark.png" alt="washli" width="36" height="36" /><b>washli</b></div>
      <nav class="seg" id="langseg" aria-label="Lingua"></nav>
    </header>
    <div class="hero">
      <div class="glass">
        <div class="copy" id="copy">

          <h1><span data-i="h1a"></span> <span class="accent" data-i="h1b"></span></h1>
          <p class="sub" data-i="sub"></p>
        </div>
        <form class="actions" id="notify" novalidate>
          <input type="checkbox" name="botcheck" style="display:none" tabindex="-1" autocomplete="off" aria-hidden="true" />

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="m4 7 8 6 8-6"/></svg>
            <input type="email" id="email" name="email" required data-i-ph="ph" />
          </label>
          <button class="cta" id="cta" type="submit" data-i="cta"></button>
        </form>
        <div class="thanks" id="thanks"><span class="pray">🙏</span><span><b data-i="thanks"></b><span data-i="thanksSub"></span></span></div>

        <p class="hint"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg><span data-i="hint"></span></p>
      </div>

  <nav class="dots" id="dots" aria-label="Tappe"></nav>

  <div class="cookie" id="cookie" role="dialog" aria-live="polite">

  <div class="loader" id="loader">
    <div>
      <div class="machine">
        <div class="panel"><i></i><i></i><i></i></div>
        <div class="door"><div class="glass"><div class="drum" id="drum"></div></div></div>
      </div>
      <div class="loadtxt" id="loadtxt">washli</div>
    </div>
  </div>

  <script type="importmap">
  { "imports": { "three": "https://esm.sh/three@0.160.1", "three/addons/": "https://esm.sh/three@0.160.1/examples/jsm/" } }
  </script>

  <script>
    // tumbling clothes inside the loader porthole (built before the heavy 3D)
    (function () {
      var drum = document.getElementById("drum"); if (!drum) return;
      var cols = ["#3f74cf", "#46c2b0", "#ffffff", "#bfe0ff"];
      var spots = [[18,20,16,12],[40,30,14,10],[26,44,18,12],[46,50,12,10],[14,40,12,9]];
      spots.forEach(function (s, i) { var b = document.createElement("b"); b.style.left = s[0] + "px"; b.style.top = s[1] + "px"; b.style.width = s[2] + "px"; b.style.height = s[3] + "px"; b.style.background = cols[i % cols.length]; b.style.transform = "rotate(" + (i * 37) + "deg)"; drum.appendChild(b); });
    })();
  </script>

  <script type="module">
    import * as THREE from "three";
    import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
    import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
    import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
    import { RGBELoader } from "three/addons/loaders/RGBELoader.js";

    const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const isMobile = Math.min(window.innerWidth, window.innerHeight) < 760 || /Mobi|Android/i.test(navigator.userAgent);
    const COUNTS = isMobile ? { cloth: 12, bubbles: 46, stars: 130 } : { cloth: 22, bubbles: 95, stars: 300 };
    const C = (h) => new THREE.Color(h);

    // three moods inside the underwater-blue world (dawn dive → deep wash → surfacing light)
    const MOODS = [
      { key: "ritiro",   top: C("#3f8fe0"), bot: C("#0e3a78"), fog: C("#1f5fb0"), fogD: 0.030, sun: C("#dcefff"), sunI: 1.05, speed: 2.2, sparkle: 0.7 },
      { key: "lavaggio", top: C("#2f7fd6"), bot: C("#06224f"), fog: C("#124a96"), fogD: 0.055, sun: C("#bfe3ff"), sunI: 0.95, speed: 3.4, sparkle: 1.0 },
      { key: "consegna", top: C("#9fcfe8"), bot: C("#2a6aae"), fog: C("#5f9fcb"), fogD: 0.032, sun: C("#eaf6ff"), sunI: 1.08, speed: 2.0, sparkle: 0.85 },
    ];

    const canvas = document.getElementById("scene");
    let renderer;
    try { renderer = new THREE.WebGLRenderer({ canvas, antialias: !isMobile, alpha: true, powerPreference: "high-performance" }); }
    catch (e) { document.getElementById("loader").classList.add("hide"); throw e; }
    const DPR = Math.min(window.devicePixelRatio || 1, isMobile ? 1.5 : 1.9);
    renderer.setPixelRatio(DPR);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.05; renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(MOODS[0].fog.clone(), MOODS[0].fogD);

    // background: tweenable underwater gradient dome
    const skyU = { uTop: { value: MOODS[0].top.clone() }, uBot: { value: MOODS[0].bot.clone() } };
    scene.add(new THREE.Mesh(new THREE.SphereGeometry(120, 32, 16), new THREE.ShaderMaterial({
      uniforms: skyU, side: THREE.BackSide, depthWrite: false, fog: false,
      vertexShader: "varying vec3 vW; void main(){ vW=(modelMatrix*vec4(position,1.0)).xyz; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}",
      fragmentShader: "uniform vec3 uTop;uniform vec3 uBot;varying vec3 vW;void main(){float h=clamp(vW.y/100.0*0.5+0.5,0.0,1.0);gl_FragColor=vec4(mix(uBot,uTop,pow(h,0.85)),1.0);}",
    })));

    // HDRI used ONLY for realistic reflections on bubbles/cloth (not as background)
    const pmrem = new THREE.PMREMGenerator(renderer); pmrem.compileEquirectangularShader();
    new RGBELoader().load("https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/textures/equirectangular/quarry_01_1k.hdr",
      (tex) => { tex.mapping = THREE.EquirectangularReflectionMapping; scene.environment = pmrem.fromEquirectangular(tex).texture; tex.dispose(); }, undefined, () => {});

    const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 0, 0);

    scene.add(new THREE.HemisphereLight(0xeaf6ff, 0x06224f, 1.0));
    const sun = new THREE.DirectionalLight(MOODS[0].sun.clone(), MOODS[0].sunI); sun.position.set(2, 12, 4); scene.add(sun);

    // ---- light shafts (god rays): soft, diffuse, gently shimmering/swaying ----
    const shaftGeo = new THREE.PlaneGeometry(3.6, 50, 1, 1);
    // soft on the sides AND faded to zero at BOTH ends (no hard cut where a
    // shaft would 'hit the ground') — brightest in the upper third near the surface.
    const shaftFrag = "uniform float uTime;uniform float uPhase;uniform float uOpacity;uniform vec3 uColor;varying vec2 vUv;void main(){ float edge=smoothstep(0.0,0.5,vUv.x)*smoothstep(1.0,0.5,vUv.x); edge*=edge; float vert=pow(clamp(vUv.y,0.0,1.0),1.4)*smoothstep(1.0,0.78,vUv.y); float shim=0.6+0.4*sin(uTime*0.6+uPhase+vUv.y*1.6); gl_FragColor=vec4(uColor, uOpacity*edge*vert*shim);}";
    const shaftVert = "varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}";
    const shafts = [];
    for (let i = 0; i < (isMobile ? 4 : 7); i++) {
      const mat = new THREE.ShaderMaterial({ transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
        uniforms: { uTime: { value: 0 }, uPhase: { value: Math.random() * 6.28 }, uOpacity: { value: 0.05 + Math.random() * 0.06 }, uColor: { value: new THREE.Color("#cfeaff") } },
        vertexShader: shaftVert, fragmentShader: shaftFrag });
      const m = new THREE.Mesh(shaftGeo, mat);
      m.position.set((Math.random() - 0.5) * 30, 9, -10 - Math.random() * 42);
      m.rotation.z = (Math.random() - 0.5) * 0.3; m.scale.x = 0.7 + Math.random() * 1.8;
      m.userData = { baseX: m.position.x, sway: 0.6 + Math.random() * 1.1, ph: Math.random() * 6.28 };
      shafts.push(m); scene.add(m);
    }

    // ---- clean laundry as EMOJI sprites (👕👖🧦🧺🧼…) — reads better than drawn shapes ----
    function emojiTex(ch) { const c = document.createElement("canvas"); c.width = c.height = 128; const x = c.getContext("2d"); x.clearRect(0,0,128,128); x.font = "100px 'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif"; x.textAlign = "center"; x.textBaseline = "middle"; x.fillText(ch, 64, 72); const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = 4; return t; }
    const EMOJIS = ["👕","👖","🧦","🧺","🧼","👚","🩳","🧤","🧣","🧥"];
    const emojiTexCache = EMOJIS.map(emojiTex);
    const items = [];
    for (let i = 0; i < COUNTS.cloth; i++) {
      const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: emojiTexCache[i % emojiTexCache.length], transparent: true, depthWrite: false }));
      s.position.set((Math.random()-0.5)*22, (Math.random()-0.5)*14, -Math.random()*60);
      const sz = 0.9 + Math.random()*0.9; s.scale.set(sz, sz, sz);
      s.material.rotation = (Math.random()-0.5)*0.6;
      s.userData = { rot: (Math.random()-0.5)*0.5, ph: Math.random()*6.28, base: sz };
      items.push(s); scene.add(s);
    }

    // ---- soap bubbles: glossy mirror spheres reflecting the HDRI ----
    const bubbleMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.05, metalness: 0.0, transparent: true, opacity: 0.4, depthWrite: false, envMapIntensity: 1.8 });
    const bubbles = new THREE.InstancedMesh(new THREE.IcosahedronGeometry(1, 3), bubbleMat, COUNTS.bubbles);
    const bdata = [], mtx = new THREE.Matrix4(), q = new THREE.Quaternion(), sc = new THREE.Vector3(), pv = new THREE.Vector3();
    for (let i = 0; i < COUNTS.bubbles; i++) { const d = { x:(Math.random()-0.5)*26, y:(Math.random()-0.5)*16, z:-Math.random()*60, r:0.05+Math.random()*0.5, rise:0.3+Math.random()*0.7 }; bdata.push(d); pv.set(d.x,d.y,d.z); sc.setScalar(d.r); mtx.compose(pv,q,sc); bubbles.setMatrixAt(i,mtx); } scene.add(bubbles);

    // ---- "lucine / stelline": twinkling stars (clean sparkle) ----
    function starTex() { const c = document.createElement("canvas"); c.width = c.height = 64; const x = c.getContext("2d"); const g = x.createRadialGradient(32,32,0,32,32,32); g.addColorStop(0,"rgba(255,255,255,1)"); g.addColorStop(0.25,"rgba(220,240,255,0.9)"); g.addColorStop(1,"rgba(255,255,255,0)"); x.fillStyle=g; x.beginPath(); x.arc(32,32,32,0,6.28); x.fill(); x.strokeStyle="rgba(255,255,255,0.95)"; x.lineWidth=3; x.beginPath(); x.moveTo(32,6);x.lineTo(32,58);x.moveTo(6,32);x.lineTo(58,32); x.stroke(); const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t; }
