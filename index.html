<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>washli — il mondo fresco</title>
<meta name="description" content="washli: entra nel mondo fresco del bucato in rete. Un viaggio 3D — ritiro, lavaggio, consegna. Trascina per guardarti intorno, tocca per cambiare scena." />
<meta name="theme-color" content="#1B4DB1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --primary: #1B4DB1;
    --secondary: #24B3A8;
    --text: oklch(0.24 0.04 258);
    --muted: oklch(0.52 0.035 258);
    --border: oklch(0.9 0.02 252 / 0.7);
    --card: oklch(0.99 0.004 250 / 0.72);
    --ring: oklch(0.62 0.13 258 / 0.35);
    color-scheme: light;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { font-family: "Hanken Grotesk", system-ui, sans-serif; color: var(--text); background: #eaf2fb; -webkit-font-smoothing: antialiased; overflow: hidden; overscroll-behavior: none; }
  #scene { position: fixed; inset: 0; z-index: 0; display: block; touch-action: none; cursor: grab; }
  #scene:active { cursor: grabbing; }
  #bg { position: fixed; inset: 0; z-index: -1; background: linear-gradient(180deg, #eef6ff 0%, #e6f5f1 100%); }

  #ui { position: fixed; inset: 0; z-index: 4; pointer-events: none; display: flex; flex-direction: column; }
  #ui > * { pointer-events: auto; }
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 18px clamp(16px,4vw,52px); }
  .lockup { display: inline-flex; align-items: center; gap: 11px; }
  .lockup img { width: 36px; height: 36px; filter: drop-shadow(0 8px 18px oklch(0.62 0.13 258 / 0.35)); }
  .lockup b { font-family: "Bricolage Grotesque", sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.03em; color: var(--primary); }
  .seg { display: inline-flex; gap: 2px; padding: 4px; background: oklch(1 0 0 / 0.6); border: 1px solid var(--border); border-radius: 999px; backdrop-filter: blur(10px); box-shadow: 0 2px 12px -4px oklch(0.4 0.05 258 / 0.3); }
  .seg button { appearance: none; border: 0; background: transparent; color: var(--muted); font: 600 12px/1 "Hanken Grotesk", sans-serif; letter-spacing: 0.04em; padding: 8px 10px; border-radius: 999px; cursor: pointer; transition: color .2s, background-color .2s; }
  .seg button[aria-pressed="true"] { color: #fff; background: linear-gradient(135deg, var(--primary), var(--secondary)); }

  .hero { margin-top: auto; padding: clamp(18px,4vw,54px); max-width: 620px; }
  .glass { background: var(--card); border: 1px solid var(--border); border-radius: 22px; padding: clamp(18px,3vw,28px); backdrop-filter: blur(16px) saturate(1.2); box-shadow: 0 30px 70px -36px oklch(0.35 0.06 258 / 0.6); }
  .copy { transition: opacity .25s ease, transform .25s ease; }
  .copy.swap { opacity: 0; transform: translateY(6px); }
  .eyebrow { display: inline-flex; align-items: center; gap: 9px; font-size: 11.5px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--secondary); margin-bottom: 12px; }
  .eyebrow .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--secondary); box-shadow: 0 0 0 0 oklch(0.7 0.12 178 / 0.6); animation: pulse 2.2s ease-out infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 oklch(0.7 0.12 178 / 0.55); } 70% { box-shadow: 0 0 0 11px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }
  h1 { font-family: "Bricolage Grotesque", sans-serif; font-weight: 700; font-size: clamp(30px,6vw,60px); line-height: 1.02; letter-spacing: -0.035em; margin: 0 0 14px; }
  h1 .accent { color: var(--secondary); }
  .sub { font-size: clamp(14px,1.4vw,17px); line-height: 1.6; color: var(--muted); margin: 0 0 20px; max-width: 38em; }
  .actions { display: flex; flex-wrap: wrap; gap: 10px; }
  .field { position: relative; display: flex; align-items: center; flex: 1 1 220px; min-width: 0; border-radius: 13px; background: oklch(1 0 0 / 0.85); border: 1px solid var(--border); }
  .field svg { position: absolute; left: 14px; width: 18px; height: 18px; color: var(--muted); }
  .field input { flex: 1; border: 0; background: transparent; color: var(--text); font: 500 15px/1 "Hanken Grotesk", sans-serif; padding: 15px 14px 15px 42px; outline: none; width: 100%; }
  .field.invalid { box-shadow: 0 0 0 4px oklch(0.62 0.18 18 / 0.3); }
  .cta { position: relative; overflow: hidden; appearance: none; border: 0; cursor: pointer; padding: 14px 20px; border-radius: 12px; color: #fff; font: 700 14.5px/1 "Hanken Grotesk", sans-serif; background: linear-gradient(135deg, var(--primary), var(--secondary)); box-shadow: 0 12px 26px -10px var(--ring); }
  .cta[disabled] { opacity: 0.7; cursor: default; }
  .formerr { color: oklch(0.55 0.18 18); font-size: 13px; margin: 10px 0 0; display: none; }
  .thanks { display: none; align-items: center; gap: 13px; }
  .thanks.show { display: flex; }
  .thanks .pray { font-size: 27px; }
  .thanks b { font-family: "Bricolage Grotesque", sans-serif; font-weight: 700; font-size: 17px; color: var(--text); display: block; }
  .thanks span { font-size: 13.5px; color: var(--muted); }
  .hint { margin: 14px 0 0; font-size: 12px; color: var(--muted); display: inline-flex; align-items: center; gap: 7px; opacity: 0.9; }
  .hint svg { width: 14px; height: 14px; flex: none; }

  /* scene dots */
  .dots { position: fixed; right: clamp(14px,3vw,30px); top: 50%; transform: translateY(-50%); z-index: 5;
    display: flex; flex-direction: column; gap: 14px; }
  .dots button { appearance: none; border: 0; cursor: pointer; width: 12px; height: 12px; padding: 0; border-radius: 50%;
    background: oklch(0.62 0.13 258 / 0.25); position: relative; transition: background-color .3s, transform .3s; }
  .dots button[aria-current="true"] { background: linear-gradient(135deg, var(--primary), var(--secondary)); transform: scale(1.25); }
  .dots button::after { content: attr(data-label); position: absolute; right: 22px; top: 50%; transform: translateY(-50%);
    font: 600 11px/1 "Hanken Grotesk", sans-serif; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted);
    white-space: nowrap; opacity: 0; transition: opacity .25s; pointer-events: none; }
  .dots button[aria-current="true"]::after, .dots:hover button::after { opacity: 0.9; }

  @media (max-width: 620px) {
    .hero { max-width: 100%; }
    .lockup b { font-size: 20px; }
    .actions { flex-direction: column; align-items: stretch; }
    .cta { width: 100%; }
    .dots { right: 12px; gap: 12px; }
    .dots button::after { display: none; }
  }

  .cookie { position: fixed; left: 50%; bottom: max(16px, env(safe-area-inset-bottom)); transform: translateX(-50%) translateY(150%);
    z-index: 6; display: flex; align-items: center; gap: 13px; width: min(640px, calc(100vw - 28px));
    padding: 12px 15px; border-radius: 16px; background: oklch(1 0 0 / 0.9); border: 1px solid var(--border);
    box-shadow: 0 22px 56px -24px oklch(0.4 0.06 258 / 0.55); backdrop-filter: blur(12px);
    opacity: 0; transition: transform .5s cubic-bezier(.16,1,.3,1), opacity .4s; }
  .cookie.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .cookie p { margin: 0; flex: 1; font-size: 12.5px; line-height: 1.45; color: var(--muted); }
  .cookie .ck { display: flex; gap: 8px; flex: none; }
  .cookie button { appearance: none; cursor: pointer; border: 0; border-radius: 10px; font: 600 12.5px/1 "Hanken Grotesk", sans-serif; padding: 9px 13px; }
  .cookie .ck-no { border: 1px solid var(--border); background: transparent; color: var(--text); }
  .cookie .ck-yes { color: #fff; background: linear-gradient(135deg, var(--primary), var(--secondary)); }
  @media (max-width: 560px) { .cookie { flex-wrap: wrap; } .cookie p { flex-basis: 100%; } .cookie .ck { width: 100%; } .cookie .ck button { flex: 1; } }

  .loader { position: fixed; inset: 0; z-index: 8; display: grid; place-items: center; background: linear-gradient(180deg,#eef6ff,#e6f5f1); transition: opacity .8s ease; }
  .loader.hide { opacity: 0; pointer-events: none; }
  .loader .spin { width: 42px; height: 42px; border-radius: 50%; border: 3px solid oklch(0.62 0.13 258 / 0.2); border-top-color: var(--primary); animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div id="bg" aria-hidden="true"></div>
  <canvas id="scene"></canvas>

  <div id="ui">
    <header class="topbar">
      <div class="lockup"><img src="assets/washli_mark.png" alt="washli" width="36" height="36" /><b>washli</b></div>
      <nav class="seg" id="langseg" aria-label="Lingua"></nav>
    </header>
    <div class="hero">
      <div class="glass">
        <div class="copy" id="copy">
          <div class="eyebrow"><span class="dot"></span><span data-i="eyebrow"></span></div>
          <h1><span data-i="h1a"></span> <span class="accent" data-i="h1b"></span></h1>
          <p class="sub" data-i="sub"></p>
        </div>
        <form class="actions" id="notify" novalidate>
          <input type="checkbox" name="botcheck" style="display:none" tabindex="-1" autocomplete="off" aria-hidden="true" />
          <label class="field">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="m4 7 8 6 8-6"/></svg>
            <input type="email" id="email" name="email" required data-i-ph="ph" />
          </label>
          <button class="cta" id="cta" type="submit" data-i="cta"></button>
        </form>
        <div class="thanks" id="thanks">
          <span class="pray">🙏</span>
          <span><b data-i="thanks"></b><span data-i="thanksSub"></span></span>
        </div>
        <p class="formerr" id="formerr" data-i="err"></p>
        <p class="hint"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg><span data-i="hint"></span></p>
      </div>
    </div>
  </div>

  <nav class="dots" id="dots" aria-label="Scene"></nav>

  <div class="cookie" id="cookie" role="dialog" aria-live="polite">
    <p data-i="ckText"></p>
    <div class="ck">
      <button class="ck-no" id="ckNo" data-i="ckDecline"></button>
      <button class="ck-yes" id="ckYes" data-i="ckAccept"></button>
    </div>
  </div>

  <div class="loader" id="loader"><div class="spin"></div></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.160.1",
      "three/addons/": "https://esm.sh/three@0.160.1/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
    import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
    import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

    const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const isMobile = Math.min(window.innerWidth, window.innerHeight) < 760 || /Mobi|Android/i.test(navigator.userAgent);
    const COUNTS = isMobile ? { garments: 12, bubbles: 30, sparkles: 160 } : { garments: 26, bubbles: 64, sparkles: 420 };

    // ---- scenes: palette + per-scene mood (copy comes from the i18n script) ----
    const C = (h) => new THREE.Color(h);
    const SCENES = [
      { key: "ritiro",   skyTop: C("#ffe7cf"), skyBot: C("#cfe6ff"), fog: C("#e9e0ea"), fogD: 0.034, sun: C("#fff0df"), sunI: 1.20, gA: C("#1e4fa6"), gB: C("#5b97da"), tint: C("#ffd9b0"), bubSpeed: 0.8,  radius: 9.6,  phi: 1.46 },
      { key: "lavaggio", skyTop: C("#bfe6ff"), skyBot: C("#1f5fc6"), fog: C("#3f86d6"), fogD: 0.060, sun: C("#d6ecff"), sunI: 1.05, gA: C("#173f95"), gB: C("#56a8e8"), tint: C("#bfe9ff"), bubSpeed: 2.1, radius: 7.6,  phi: 1.56 },
      { key: "consegna", skyTop: C("#dff7ee"), skyBot: C("#9fcde8"), fog: C("#d3ebe3"), fogD: 0.030, sun: C("#ffffff"), sunI: 1.30, gA: C("#0f8e7c"), gB: C("#46c2b0"), tint: C("#bfeede"), bubSpeed: 0.9,  radius: 10.2, phi: 1.44 },
    ];

    const canvas = document.getElementById("scene");
    let renderer;
    try { renderer = new THREE.WebGLRenderer({ canvas, antialias: !isMobile, alpha: true, powerPreference: "high-performance" }); }
    catch (e) { document.getElementById("loader").classList.add("hide"); throw e; }
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, isMobile ? 1.6 : 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.04;
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(SCENES[0].fog.clone(), SCENES[0].fogD);

    const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 260);
    const camTarget = new THREE.Vector3(0, 0.9, 0);

    // ---- sky dome (tweenable gradient) ----
    const skyUniforms = { uTop: { value: SCENES[0].skyTop.clone() }, uBot: { value: SCENES[0].skyBot.clone() } };
    const sky = new THREE.Mesh(
      new THREE.SphereGeometry(110, 32, 16),
      new THREE.ShaderMaterial({
        uniforms: skyUniforms, side: THREE.BackSide, depthWrite: false, fog: false,
        vertexShader: `varying vec3 vW; void main(){ vW = (modelMatrix*vec4(position,1.0)).xyz; gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
        fragmentShader: `uniform vec3 uTop; uniform vec3 uBot; varying vec3 vW; void main(){ float h = clamp(vW.y/90.0*0.5+0.5,0.0,1.0); gl_FragColor = vec4(mix(uBot,uTop,pow(h,0.9)),1.0); }`,
      })
    );
    scene.add(sky);

    // ---- lights ----
    scene.add(new THREE.HemisphereLight(0xffffff, 0xbfe3ff, 1.05));
    const sun = new THREE.DirectionalLight(SCENES[0].sun.clone(), SCENES[0].sunI);
    sun.position.set(6, 10, 6); scene.add(sun);
    const rim = new THREE.DirectionalLight(0x9fe6df, 0.6); rim.position.set(-8, -3, -6); scene.add(rim);

    // ---- garments (cloth-rippled planes) ----
    const garmentVert = `
      uniform float uTime; uniform float uPhase; varying vec2 vUv; varying float vRip;
      void main(){ vUv = uv; vec3 p = position; float t = uTime + uPhase;
        float w = sin(p.x*3.0+t*1.6)*0.10 + sin(p.y*4.0+t*1.1)*0.07 + sin((p.x+p.y)*2.0+t)*0.05;
        p.z += w; vRip = w; gl_Position = projectionMatrix*modelViewMatrix*vec4(p,1.0); }`;
    const garmentFrag = `
      uniform vec3 uA; uniform vec3 uB; uniform float uOpacity; varying vec2 vUv; varying float vRip;
      void main(){ vec3 col = mix(uA,uB,smoothstep(0.0,1.0,vUv.y*0.7+vUv.x*0.3)); col += vRip*0.6;
        float edge = smoothstep(0.0,0.12,vUv.x)*smoothstep(1.0,0.88,vUv.x)*smoothstep(0.0,0.10,vUv.y)*smoothstep(1.0,0.90,vUv.y);
        gl_FragColor = vec4(col, uOpacity*(0.55+0.45*edge)); }`;
    const garmentGeo = new THREE.PlaneGeometry(1.25, 1.7, 24, 28);
    const garments = [];
    for (let i = 0; i < COUNTS.garments; i++) {
      const mix = Math.random();
      const mat = new THREE.ShaderMaterial({
        uniforms: { uTime: { value: 0 }, uPhase: { value: Math.random()*100 }, uA: { value: new THREE.Color() }, uB: { value: new THREE.Color() }, uOpacity: { value: 0.82 } },
        vertexShader: garmentVert, fragmentShader: garmentFrag, transparent: true, side: THREE.DoubleSide, depthWrite: false,
      });
      const m = new THREE.Mesh(garmentGeo, mat);
      const r = 9 + Math.random()*9, ang = Math.random()*Math.PI*2;
      m.position.set(Math.cos(ang)*r, (Math.random()-0.5)*9, Math.sin(ang)*r - 2);
      m.rotation.set((Math.random()-0.5)*1.2, Math.random()*Math.PI*2, (Math.random()-0.5)*0.9);
      m.scale.setScalar(0.7 + Math.random()*1.1);
      m.userData = { spin: (Math.random()-0.5)*0.06, driftY: 0.1 + Math.random()*0.18, baseY: m.position.y, mix };
      garments.push(m); scene.add(m);
    }

    // ---- soap bubbles (instanced fresnel iridescence) ----
    const bubbleVert = `varying vec3 vN; varying vec3 vView;
      void main(){ vec4 mp = modelViewMatrix*instanceMatrix*vec4(position,1.0);
        vN = normalize(mat3(modelViewMatrix)*mat3(instanceMatrix)*normal); vView = normalize(-mp.xyz);
        gl_Position = projectionMatrix*mp; }`;
    const bubbleFrag = `uniform vec3 uTint; varying vec3 vN; varying vec3 vView;
      vec3 iri(float t){ return 0.55+0.45*cos(6.2831*(t+vec3(0.0,0.33,0.66))); }
      void main(){ float f = pow(1.0-max(dot(normalize(vN),normalize(vView)),0.0),2.2);
        vec3 col = mix(vec3(0.82,0.93,1.0), iri(f*0.8+0.1), 0.6); col = mix(col, uTint, 0.22);
        gl_FragColor = vec4(col, clamp(f*0.9+0.06,0.0,0.85)); }`;
    const bubbleMat = new THREE.ShaderMaterial({ uniforms: { uTint: { value: SCENES[0].tint.clone() } }, vertexShader: bubbleVert, fragmentShader: bubbleFrag, transparent: true, depthWrite: false, side: THREE.FrontSide });
    const bubbles = new THREE.InstancedMesh(new THREE.IcosahedronGeometry(1, 3), bubbleMat, COUNTS.bubbles);
    const bubbleData = [];
    const tmpM = new THREE.Matrix4(), tmpQ = new THREE.Quaternion(), tmpS = new THREE.Vector3(), tmpP = new THREE.Vector3();
    for (let i = 0; i < COUNTS.bubbles; i++) {
      const d = { x: (Math.random()-0.5)*22, y: (Math.random()-0.5)*12, z: (Math.random()-0.5)*16 - 2, r: 0.18 + Math.random()*0.7, sp: 0.25 + Math.random()*0.5, wob: Math.random()*6.28 };
      bubbleData.push(d); tmpP.set(d.x, d.y, d.z); tmpS.setScalar(d.r); tmpM.compose(tmpP, tmpQ, tmpS); bubbles.setMatrixAt(i, tmpM);
    }
    scene.add(bubbles);

    // ---- sparkles ----
    const spGeo = new THREE.BufferGeometry();
    const spPos = new Float32Array(COUNTS.sparkles*3);
    for (let i = 0; i < COUNTS.sparkles; i++) { spPos[i*3]=(Math.random()-0.5)*40; spPos[i*3+1]=(Math.random()-0.5)*22; spPos[i*3+2]=(Math.random()-0.5)*30-2; }
    spGeo.setAttribute("position", new THREE.BufferAttribute(spPos, 3));
    const sparkles = new THREE.Points(spGeo, new THREE.PointsMaterial({ size: isMobile?0.06:0.05, color: 0xffffff, transparent: true, opacity: 0.6, depthWrite: false, blending: THREE.AdditiveBlending }));
    scene.add(sparkles);

    // ---- click ripples ----
    const ringGeo = new THREE.RingGeometry(0.6, 0.72, 48);
    const rings = [];
    for (let i = 0; i < 6; i++) { const m = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ color: 0x9fe9ff, transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending })); m.visible = false; m.userData = { t: 0 }; scene.add(m); rings.push(m); }
    let ringIdx = 0;
    function spawnRing(world) { const m = rings[ringIdx]; ringIdx = (ringIdx+1)%rings.length; m.position.copy(world); m.lookAt(camera.position); m.userData.t = 0; m.visible = true; m.material.opacity = 0.9; }

    // ---- per-scene hero models: Ritiro (home) · Lavaggio (machine) · Consegna (van) ----
    function M(color, opts) { return new THREE.MeshStandardMaterial(Object.assign({ color: new THREE.Color(color), transparent: true, roughness: 0.75, metalness: 0.05 }, opts || {})); }
    function trackMats(group) { const list = []; group.traverse((o) => { if (o.material) { (Array.isArray(o.material) ? o.material : [o.material]).forEach((m) => { m.transparent = true; list.push({ m, base: m.opacity == null ? 1 : m.opacity }); }); } }); group.userData.mats = list; }

    function buildRitiro() {
      const g = new THREE.Group();
      const walls = new THREE.Mesh(new THREE.BoxGeometry(3, 2.2, 2.6), M("#f1ede6", { roughness: 0.92 })); walls.position.y = 1.1; g.add(walls);
      const roof = new THREE.Mesh(new THREE.ConeGeometry(2.5, 1.4, 4), M("#2f6fd6", { roughness: 0.6 })); roof.position.y = 2.9; roof.rotation.y = Math.PI/4; g.add(roof);
      const door = new THREE.Mesh(new THREE.BoxGeometry(0.72, 1.25, 0.12), M("#1f9e8c")); door.position.set(0, 0.62, 1.31); g.add(door);
      for (const x of [-0.85, 0.85]) { const w = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.12), M("#bfe0ff", { emissive: new THREE.Color("#ffe6bf"), emissiveIntensity: 0.55 })); w.position.set(x, 1.4, 1.31); g.add(w); }
      const basket = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.33, 0.55, 18), M("#caa56a", { roughness: 0.95 })); basket.position.set(1.85, 0.3, 1.05); g.add(basket);
      for (let i = 0; i < 4; i++) { const c = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.16, 0.28), M(i%2 ? "#3f74cf" : "#46c2b0")); c.position.set(1.85 + (Math.random()-0.5)*0.18, 0.52 + i*0.12, 1.05 + (Math.random()-0.5)*0.18); c.rotation.y = Math.random(); g.add(c); }
      g.position.y = -1.1; return g;
    }
    function buildLavaggio() {
      const g = new THREE.Group();
      const body = new THREE.Mesh(new THREE.BoxGeometry(3, 3.2, 2.8), M("#eef3f7", { roughness: 0.85 })); body.position.y = 1.6; g.add(body);
      const ring = new THREE.Mesh(new THREE.TorusGeometry(1.0, 0.16, 16, 40), M("#b9c6d4", { metalness: 0.6, roughness: 0.35 })); ring.position.set(0, 1.7, 1.42); g.add(ring);
      const glass = new THREE.Mesh(new THREE.CircleGeometry(0.92, 40), M("#1f5fc6", { opacity: 0.5, roughness: 0.2, metalness: 0.2 })); glass.position.set(0, 1.7, 1.44); g.add(glass);
      const drum = new THREE.Group(); drum.position.set(0, 1.7, 1.34); g.add(drum); g.userData.drum = drum;
      for (let i = 0; i < 5; i++) { const a = i/5*Math.PI*2; const cl = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.62), M(i%2 ? "#56a8e8" : "#bfe0ff", { side: THREE.DoubleSide })); cl.position.set(Math.cos(a)*0.5, Math.sin(a)*0.5, 0.04); cl.rotation.z = a; drum.add(cl); }
      for (let i = 0; i < 16; i++) { const f = new THREE.Mesh(new THREE.IcosahedronGeometry(0.09 + Math.random()*0.12, 1), M("#ffffff", { roughness: 0.55, opacity: 0.92 })); const a = Math.random()*6.28, r = Math.random()*0.82; f.position.set(Math.cos(a)*r, Math.sin(a)*r, 0.05 + Math.random()*0.06); drum.add(f); }
      const panel = new THREE.Mesh(new THREE.BoxGeometry(2.6, 0.5, 0.1), M("#dde7ef")); panel.position.set(0, 3.05, 1.41); g.add(panel);
      for (const x of [-0.85, -0.45, -0.05]) { const k = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.1, 16), M("#2f6fd6")); k.rotation.x = Math.PI/2; k.position.set(x, 3.05, 1.48); g.add(k); }
      g.position.y = -1.5; return g;
    }
    function buildConsegna() {
      const g = new THREE.Group();
      const cargo = new THREE.Mesh(new THREE.BoxGeometry(3.0, 1.8, 2.0), M("#cfe0f2", { roughness: 0.65 })); cargo.position.set(0.25, 1.25, 0); g.add(cargo);
      const stripe = new THREE.Mesh(new THREE.BoxGeometry(3.06, 0.55, 2.06), M("#1f9e8c")); stripe.position.set(0.25, 0.72, 0); g.add(stripe);
      const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.3, 2.0), M("#2f6fd6")); cabin.position.set(-1.55, 1.0, 0); g.add(cabin);
      const wind = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.66, 1.7), M("#cdeeff", { opacity: 0.85, metalness: 0.3, roughness: 0.2 })); wind.position.set(-2.18, 1.2, 0); g.add(wind);
      const wheels = new THREE.Group(); g.add(wheels);
      for (const wx of [-1.5, 1.05]) for (const wz of [-0.92, 0.92]) { const w = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.42, 0.28, 20), M("#2a2f3a", { roughness: 0.85 })); w.rotation.x = Math.PI/2; w.position.set(wx, 0.45, wz); wheels.add(w); }
      try { const tex = new THREE.TextureLoader().load("assets/washli_mark.png"); tex.colorSpace = THREE.SRGBColorSpace; const logo = new THREE.Mesh(new THREE.PlaneGeometry(1.05, 1.05), new THREE.MeshBasicMaterial({ map: tex, transparent: true })); logo.position.set(0.5, 1.35, 1.02); g.add(logo); } catch (e) {}
      g.position.y = -0.9; return g;
    }

    const sceneGroups = [buildRitiro(), buildLavaggio(), buildConsegna()];
    sceneGroups.forEach((grp, i) => { trackMats(grp); grp.userData.vis = i === 0 ? 1 : 0; grp.visible = i === 0; scene.add(grp); });
    function applyGroupVis(dt, tm) {
      for (let i = 0; i < sceneGroups.length; i++) {
        const grp = sceneGroups[i], target = i === sceneIdx ? 1 : 0;
        grp.userData.vis += (target - grp.userData.vis) * (reduced ? 1 : Math.min(1, dt * 3.0));
        const v = grp.userData.vis; grp.visible = v > 0.02;
        if (grp.visible) { grp.scale.setScalar(0.84 + 0.16 * v); for (const e of grp.userData.mats) e.m.opacity = e.base * v; }
      }
      const lav = sceneGroups[1]; if (lav.userData.drum) lav.userData.drum.rotation.z -= dt * (sceneIdx === 1 ? 1.7 : 0.25) * Math.max(0.4, bubSpeed);
      const con = sceneGroups[2]; if (con.visible) con.position.y = -0.9 + Math.sin(tm * 1.7) * 0.07 * con.userData.vis;
    }

    // ---- bloom ----
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    // (resolution, strength, radius, THRESHOLD) — a high threshold means only
    // genuine highlights bloom; a low one washes the whole scene to white.
    const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), isMobile?0.3:0.42, 0.6, 0.85);
    composer.addPass(bloom);
    composer.setPixelRatio(Math.min(window.devicePixelRatio || 1, isMobile ? 1.6 : 2));
    composer.setSize(window.innerWidth, window.innerHeight);

    // ---- scene state + eased transitions toward the active scene's targets ----
    let sceneIdx = 0;
    let bubSpeed = SCENES[0].bubSpeed;
    let tRadius = SCENES[0].radius, tPhi = SCENES[0].phi;
    const gTmpA = new THREE.Color(), gTmpB = new THREE.Color();

    function goToScene(i, instant) {
      i = (i + SCENES.length) % SCENES.length;
      sceneIdx = i;
      const s = SCENES[i]; tRadius = s.radius; tPhi = s.phi;
      if (window.__washliOnScene) window.__washliOnScene(i); // UI: copy crossfade + dots
      // Smooth ease happens in the render loop; for a deep-link (instant) or
      // reduced-motion (no loop running) snap the scene + render immediately.
      if (instant || reduced) { sceneGroups.forEach((g, k) => { g.userData.vis = k === i ? 1 : 0; }); applyScene(1); render(); }
    }
    function applyScene(k) { // k = ease amount this frame (0..1)
      const s = SCENES[sceneIdx];
      skyUniforms.uTop.value.lerp(s.skyTop, k);
      skyUniforms.uBot.value.lerp(s.skyBot, k);
      scene.fog.color.lerp(s.fog, k);
      scene.fog.density += (s.fogD - scene.fog.density) * k;
      sun.color.lerp(s.sun, k); sun.intensity += (s.sunI - sun.intensity) * k;
      bubbleMat.uniforms.uTint.value.lerp(s.tint, k);
      bubSpeed += (s.bubSpeed - bubSpeed) * k;
      for (const m of garments) {
        gTmpA.copy(s.gA).lerp(s.gB, m.userData.mix * 0.5);
        gTmpB.copy(s.gB).lerp(WHITE, 0.3 + m.userData.mix * 0.3);
        m.material.uniforms.uA.value.lerp(gTmpA, k);
        m.material.uniforms.uB.value.lerp(gTmpB, k);
      }
    }
    const WHITE = new THREE.Color("#ffffff");
    applyScene(1); // snap to scene 0 at start

    // ---- camera orbit (drag + inertia) + idle drift + parallax ----
    let theta = 0.5, phi = SCENES[0].phi, radius = SCENES[0].radius;
    let vTheta = 0, vPhi = 0, dragging = false, lastX = 0, lastY = 0, lastMove = 0;
    let parX = 0, parY = 0, tParX = 0, tParY = 0, downX = 0, downY = 0, downT = 0;

    function onMove(e) {
      const t = e.touches ? e.touches[0] : e; if (!t) return;
      tParX = (t.clientX/window.innerWidth - 0.5); tParY = (t.clientY/window.innerHeight - 0.5);
      if (!dragging) return;
      const dx = t.clientX-lastX, dy = t.clientY-lastY; lastX = t.clientX; lastY = t.clientY; lastMove = performance.now();
      vTheta = -dx*0.005; vPhi = -dy*0.005; theta += vTheta; phi = Math.max(0.6, Math.min(2.4, phi+vPhi));
    }
    function screenToWorld(cx, cy) { const ndc = new THREE.Vector2((cx/window.innerWidth)*2-1, -(cy/window.innerHeight)*2+1); const ray = new THREE.Raycaster(); ray.setFromCamera(ndc, camera); return ray.ray.at(8 + Math.random()*3, new THREE.Vector3()); }
    function overUI(e) { const el = document.elementFromPoint(e.clientX, e.clientY); return el && el.closest && el.closest("#ui, .cookie, .dots"); }

    canvas.addEventListener("pointerdown", (e) => { dragging = true; lastMove = performance.now(); lastX = e.clientX; lastY = e.clientY; downX = e.clientX; downY = e.clientY; downT = performance.now(); }, { passive: true });
    window.addEventListener("pointermove", onMove, { passive: true });
    window.addEventListener("pointerup", (e) => {
      dragging = false;
      const moved = Math.hypot(e.clientX-downX, e.clientY-downY);
      if (moved < 8 && performance.now()-downT < 500 && !overUI(e)) { spawnRing(screenToWorld(e.clientX, e.clientY)); goToScene(sceneIdx + 1); } // tap = advance the journey
    }, { passive: true });
    window.addEventListener("pointercancel", () => { dragging = false; }, { passive: true });

    function resize() { const w = window.innerWidth, h = window.innerHeight; camera.aspect = w/h; camera.updateProjectionMatrix(); renderer.setSize(w,h); composer.setSize(w,h); bloom.setSize(w,h); }
    window.addEventListener("resize", resize);

    const clock = new THREE.Clock();
    function render() {
      const dt = Math.min(clock.getDelta(), 0.05), tm = clock.elapsedTime;
      applyScene(reduced ? 1 : Math.min(1, dt * 2.4)); // ease toward active scene
      radius += (tRadius - radius) * Math.min(1, dt * 1.8);
      theta += dt * 0.085; // constant gentle auto-orbit — alive without dragging
      if (!dragging) {
        phi += (tPhi - phi) * Math.min(1, dt * 1.2);
        vTheta *= 0.92; vPhi *= 0.92; theta += vTheta; phi = Math.max(0.6, Math.min(2.4, phi+vPhi));
      }
      parX += (tParX-parX)*0.04; parY += (tParY-parY)*0.04;
      camera.position.set(Math.sin(theta)*Math.sin(phi)*radius + parX*2.2, Math.cos(phi)*radius - parY*1.6 + 0.6, Math.cos(theta)*Math.sin(phi)*radius);
      camera.lookAt(camTarget);

      for (const m of garments) { m.material.uniforms.uTime.value = tm; m.rotation.y += m.userData.spin*dt; m.position.y = m.userData.baseY + Math.sin(tm*m.userData.driftY + m.userData.baseY)*0.5; }
      for (let i = 0; i < bubbleData.length; i++) { const d = bubbleData[i]; d.y += d.sp*bubSpeed*dt; if (d.y > 7) { d.y = -7; d.x = (Math.random()-0.5)*22; } tmpP.set(d.x + Math.sin(tm*0.6+d.wob)*0.4*bubSpeed, d.y, d.z + Math.cos(tm*0.5+d.wob)*0.3*bubSpeed); tmpS.setScalar(d.r); tmpM.compose(tmpP, tmpQ, tmpS); bubbles.setMatrixAt(i, tmpM); }
      bubbles.instanceMatrix.needsUpdate = true;
      sparkles.rotation.y += dt*0.01;
      for (const m of rings) { if (!m.visible) continue; m.userData.t += dt; const k = m.userData.t/1.1; if (k >= 1) { m.visible = false; continue; } m.scale.setScalar(0.4 + k*7); m.material.opacity = 0.9*(1-k); }
      applyGroupVis(dt, tm);
      composer.render();
    }

    let running = true;
    function loop() { if (!running) return; render(); requestAnimationFrame(loop); }
    resize();
    if (reduced) render(); else loop();
    requestAnimationFrame(() => document.getElementById("loader").classList.add("hide"));
    { const q = new URLSearchParams(location.search).get("scene"); if (q !== null) goToScene(parseInt(q) || 0, true); } // deep-link a scene
    document.addEventListener("visibilitychange", () => { if (document.hidden) running = false; else if (!reduced) { running = true; clock.getDelta(); loop(); } });

    // expose scene control to the UI script
    window.__washliWorld = { go: goToScene, scenes: SCENES.map((s) => s.key), get index() { return sceneIdx; } };
  </script>

      // email → Web3Forms
      var form = document.getElementById("notify"), email = document.getElementById("email"), cta = document.getElementById("cta"), err = document.getElementById("formerr"), thanks = document.getElementById("thanks");
      form.addEventListener("submit", function (e) {

      });

      function choose(v) { try { localStorage.setItem("washli-cookie-consent", v); } catch (e) {} cookie.classList.remove("show"); }

    })();
